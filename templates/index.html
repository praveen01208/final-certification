<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Certificate Dispatch — KLE CET</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #C9A84C; --gold-lt: #E8C97A; --gold-dk: #8B6914;
      --ink: #0D0C0A; --paper: #F5F0E8;
      --border: rgba(201,168,76,0.25);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--ink); color: var(--paper); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,76,0.12) 0%, transparent 70%); pointer-events: none; }
    header { width: 100%; padding: 2.5rem 3rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 1.5rem; animation: fadeDown .6s ease both; }
    .logo-seal { width: 52px; height: 52px; border: 2px solid var(--gold); border-radius: 50%; display: grid; place-items: center; font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold); flex-shrink: 0; }
    .header-text h1 { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 600; }
    .header-text p { font-size: .78rem; font-weight: 300; color: var(--gold); letter-spacing: .08em; text-transform: uppercase; margin-top: 2px; }
    main { width: 100%; max-width: 820px; padding: 3rem 2rem 5rem; animation: fadeUp .7s .1s ease both; }
    .section-label { font-size: .7rem; font-weight: 500; letter-spacing: .14em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.4rem; display: flex; align-items: center; gap: .75rem; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 2rem; }
    @media (max-width: 600px) { .upload-grid { grid-template-columns: 1fr; } header { padding: 1.5rem; } .field-row { grid-template-columns: 1fr !important; } }
    .upload-card { background: rgba(255,255,255,0.03); border: 1.5px dashed rgba(201,168,76,0.3); border-radius: 12px; padding: 2rem 1.5rem; text-align: center; cursor: pointer; transition: border-color .25s, background .25s, transform .2s; position: relative; overflow: hidden; }
    .upload-card:hover, .upload-card.drag-over { border-color: var(--gold); background: rgba(201,168,76,0.06); transform: translateY(-2px); }
    .upload-card.filled { border-style: solid; border-color: rgba(201,168,76,0.55); background: rgba(201,168,76,0.05); }
    .upload-card input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { width: 44px; height: 44px; margin: 0 auto 1rem; border: 1.5px solid rgba(201,168,76,0.4); border-radius: 10px; display: grid; place-items: center; transition: border-color .25s; }
    .upload-card:hover .upload-icon, .upload-card.filled .upload-icon { border-color: var(--gold); }
    .upload-icon svg { width: 20px; height: 20px; stroke: var(--gold); fill: none; stroke-width: 1.8; }
    .upload-card h3 { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600; margin-bottom: .4rem; }
    .upload-card p { font-size: .78rem; color: rgba(245,240,232,0.45); line-height: 1.5; }
    .file-badge { display: inline-flex; align-items: center; gap: .4rem; margin-top: .9rem; background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3); border-radius: 20px; padding: .3rem .8rem; font-size: .73rem; color: var(--gold-lt); max-width: 100%; overflow: hidden; }
    .file-badge span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .config-panel { background: rgba(255,255,255,0.025); border: 1px solid var(--border); border-radius: 12px; padding: 1.8rem; margin-bottom: 2rem; }
    .brevo-badge { display: inline-flex; align-items: center; gap: .5rem; background: rgba(9,182,134,0.1); border: 1px solid rgba(9,182,134,0.3); border-radius: 6px; padding: .35rem .8rem; font-size: .72rem; color: #09B686; margin-bottom: 1.2rem; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .field-full { margin-bottom: 1rem; }
    .field { display: flex; flex-direction: column; gap: .45rem; }
    label { font-size: .72rem; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: rgba(245,240,232,0.5); }
    input[type="text"], input[type="email"], input[type="password"] { background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.2); border-radius: 8px; padding: .65rem 1rem; color: var(--paper); font-family: 'DM Sans', sans-serif; font-size: .88rem; outline: none; transition: border-color .2s; }
    input:focus { border-color: var(--gold); background: rgba(201,168,76,0.05); }
    input::placeholder { color: rgba(245,240,232,0.2); }
    .hint { font-size: .72rem; color: rgba(245,240,232,0.3); margin-top: .3rem; }
    .hint a { color: var(--gold); text-decoration: none; }
    .hint a:hover { text-decoration: underline; }
    .send-wrap { display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap; }
    .btn-send { display: inline-flex; align-items: center; gap: .65rem; padding: .85rem 2.2rem; background: linear-gradient(135deg, var(--gold-dk) 0%, var(--gold) 50%, var(--gold-lt) 100%); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 500; color: var(--ink); cursor: pointer; transition: transform .2s, box-shadow .2s; box-shadow: 0 4px 20px rgba(201,168,76,0.25); }
    .btn-send:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(201,168,76,0.35); }
    .btn-send:disabled { opacity: .45; cursor: not-allowed; }
    .btn-send svg { width: 16px; height: 16px; stroke: var(--ink); fill: none; stroke-width: 2; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(13,12,10,0.3); border-top-color: var(--ink); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    #progress-section { margin-top: 2rem; display: none; }
    .progress-bar-track { background: rgba(255,255,255,0.06); border-radius: 99px; height: 8px; overflow: hidden; margin-bottom: .6rem; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dk), var(--gold-lt)); border-radius: 99px; width: 0%; transition: width .3s ease; }
    .progress-label { font-size: .78rem; color: rgba(245,240,232,0.45); margin-bottom: 1rem; }
    .log-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.2rem; max-height: 260px; overflow-y: auto; font-size: .78rem; line-height: 1.7; color: rgba(245,240,232,0.6); }
    .log-line { display: flex; gap: .6rem; }
    .log-line.success .dot { color: #6ECBA4; }
    .log-line.error   .dot { color: #E07070; }
    .log-line.info    .dot { color: var(--gold); }
    .status-badge { display: inline-flex; align-items: center; gap: .5rem; padding: .45rem 1rem; border-radius: 20px; font-size: .78rem; font-weight: 500; }
    .status-badge.idle    { background: rgba(255,255,255,0.05); color: rgba(245,240,232,0.4); }
    .status-badge.running { background: rgba(201,168,76,0.12); color: var(--gold-lt); border: 1px solid rgba(201,168,76,0.3); }
    .status-badge.done    { background: rgba(110,203,164,0.12); color: #6ECBA4; border: 1px solid rgba(110,203,164,0.3); }
    .status-badge.error   { background: rgba(224,112,112,0.12); color: #E07070; border: 1px solid rgba(224,112,112,0.3); }
    .pulse { animation: pulse 1.5s ease infinite; }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }
    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.4} }
  </style>
</head>
<body>
<header>
  <div class="logo-seal">KLE</div>
  <div class="header-text">
    <h1>Certificate Dispatch Portal</h1>
    <p>ReactCloud Sprint Workshop · C-TEC</p>
  </div>
</header>

<main>
  <!-- Step 1 -->
  <div class="section-label">01 &nbsp;Upload Files</div>
  <div class="upload-grid">
    <div class="upload-card" id="csv-card">
      <input type="file" id="csv-input" accept=".csv" onchange="handleFile('csv', this)"/>
      <div class="upload-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
      </div>
      <h3>Participants CSV</h3>
      <p>Columns: <code style="color:var(--gold-lt);font-size:.73rem">name, email</code></p>
      <div class="file-badge" id="csv-badge" style="display:none">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="csv-name"></span>
      </div>
    </div>
    <div class="upload-card" id="pdf-card">
      <input type="file" id="pdf-input" accept=".pdf" onchange="handleFile('pdf', this)"/>
      <div class="upload-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15v-4m3 4v-6m3 6v-2"/></svg>
      </div>
      <h3>Certificate Template</h3>
      <p>PDF with <code style="color:var(--gold-lt);font-size:.73rem">&lt;&lt;Name&gt;&gt;</code> placeholder</p>
      <div class="file-badge" id="pdf-badge" style="display:none">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="pdf-name"></span>
      </div>
    </div>
  </div>

  <!-- Step 2 -->
  <div class="section-label">02 &nbsp;Brevo Configuration</div>
  <div class="config-panel">
    <input type="hidden" id="api-key" value=""/>

    <div class="field-row" style="margin-top:1rem">
      <div class="field">
        <label for="sender-email">Verified Sender Email</label>
        <input type="email" id="sender-email" placeholder="you@yourdomain.com"/>
        <p class="hint">Must be verified in Brevo dashboard</p>
      </div>
      <div class="field">
        <label for="sender-name">Sender Name</label>
        <input type="text" id="sender-name" placeholder="C-TEC Team" value="C-TEC Team"/>
      </div>
    </div>

    <div class="field-row" style="margin-top:1rem">
      <div class="field">
        <label for="email-subject">Email Subject</label>
        <input type="text" id="email-subject" value="Your Certificate - ReactCloud Sprint Workshop"/>
      </div>
      <div class="field">
        <label for="name-col">Name Column in CSV</label>
        <input type="text" id="name-col" value="name"/>
      </div>
    </div>
  </div>

  <!-- Step 3 -->
  <div class="section-label">03 &nbsp;Dispatch</div>
  <div class="send-wrap">
    <button class="btn-send" id="send-btn" onclick="sendCertificates()" disabled>
      <svg id="btn-icon" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      <span id="btn-label">Send Certificates</span>
    </button>
    <div class="status-badge idle" id="status-badge"><span>Awaiting files</span></div>
  </div>

  <div id="progress-section">
    <div class="section-label" style="margin-top:2rem">Progress</div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="progress-label" id="progress-label">0 / 0 sent</div>
    <div class="log-box" id="log-box"></div>
  </div>
</main>

<script>
  const state = { csv: null, pdf: null };
  let pollInterval = null;
  let lastDone = 0;

  function handleFile(type, input) {
    const file = input.files[0];
    if (!file) return;
    state[type] = file;
    document.getElementById(`${type}-card`).classList.add('filled');
    document.getElementById(`${type}-badge`).style.display = 'inline-flex';
    document.getElementById(`${type}-name`).textContent = file.name;
    if (state.csv && state.pdf) {
      document.getElementById('send-btn').disabled = false;
      setStatus('idle', 'Ready to dispatch');
    }
  }

  function setStatus(cls, text) {
    const b = document.getElementById('status-badge');
    b.className = 'status-badge ' + cls;
    b.innerHTML = cls === 'running'
      ? `<span class="pulse">●</span>&nbsp;${text}`
      : `<span>${text}</span>`;
  }

  function log(msg, type = 'info') {
    const box = document.getElementById('log-box');
    const dots = { info: '◆', success: '✓', error: '✗' };
    const line = document.createElement('div');
    line.className = `log-line ${type}`;
    line.innerHTML = `<span class="dot">${dots[type]}</span><span>${msg}</span>`;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
  }

  async function sendCertificates() {
    const apiKey      = document.getElementById('api-key').value.trim();
    const senderEmail = document.getElementById('sender-email').value.trim();
    const senderName  = document.getElementById('sender-name').value.trim();
    const subject     = document.getElementById('email-subject').value.trim();
    const nameCol     = document.getElementById('name-col').value.trim() || 'name';

    if (!apiKey || !senderEmail) {
      alert('Please fill in your Brevo API key and sender email.');
      return;
    }

    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    document.getElementById('btn-label').textContent = 'Starting…';
    document.getElementById('btn-icon').outerHTML = '<div class="spinner" id="btn-icon"></div>';
    setStatus('running', 'Starting job…');
    document.getElementById('progress-section').style.display = 'block';
    document.getElementById('log-box').innerHTML = '';
    lastDone = 0;

    const formData = new FormData();
    formData.append('csv_file',     state.csv);
    formData.append('pdf_template', state.pdf);
    formData.append('api_key',      apiKey);
    formData.append('sender_email', senderEmail);
    formData.append('sender_name',  senderName);
    formData.append('subject',      subject);
    formData.append('name_col',     nameCol);

    try {
      log('Uploading files and queuing job…', 'info');
      const res  = await fetch('/send', { method: 'POST', body: formData });
      const data = await res.json();

      if (data.error) {
        log('Error: ' + data.error, 'error');
        setStatus('error', 'Failed to start');
        resetBtn(); return;
      }

      log(`Job started — ${data.total} recipients queued`, 'info');
      pollStatus(data.job_id, data.total);

    } catch (err) {
      log('Network error: ' + err.message, 'error');
      setStatus('error', 'Network error');
      resetBtn();
    }
  }

  function pollStatus(jobId, total) {
    setStatus('running', 'Sending…');
    pollInterval = setInterval(async () => {
      try {
        const res  = await fetch(`/status/${jobId}`);
        const data = await res.json();

        const newResults = data.results.slice(lastDone);
        newResults.forEach(r => {
          if (r.status === 'sent')
            log(`Certificate sent → ${r.name} (${r.email})`, 'success');
          else
            log(`Failed → ${r.name}: ${r.error}`, 'error');
        });
        lastDone = data.results.length;

        const pct = total > 0 ? Math.round((data.done / total) * 100) : 0;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-label').textContent = `${data.done} / ${total} sent`;

        if (data.status === 'complete') {
          clearInterval(pollInterval);
          const failed = data.results.filter(r => r.status !== 'sent').length;
          setStatus(failed ? 'error' : 'done',
            failed ? `Done — ${failed} failed` : `✓ All ${total} certificates sent!`);
          resetBtn('Send Again');
        }
      } catch (err) {
        log('Polling error: ' + err.message, 'error');
      }
    }, 2000);
  }

  function resetBtn(label = 'Send Certificates') {
    const btn = document.getElementById('send-btn');
    btn.disabled = false;
    document.getElementById('btn-label').textContent = label;
    const s = document.getElementById('btn-icon');
    if (s) s.outerHTML = '<svg id="btn-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
  }

  document.querySelectorAll('.upload-card').forEach(card => {
    card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-over'); });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => { e.preventDefault(); card.classList.remove('drag-over'); });
  });
</script>
</body>
</html>
